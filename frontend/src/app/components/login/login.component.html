<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="app-logo"> Taskify</div>
      <p class="auth-subtitle">Welcome back! Sign in to your workspace.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" formControlName="username" placeholder="Enter your username"
          autocomplete="username" />
        <span class="error" *ngIf="form.get('username')?.touched && form.get('username')?.hasError('required')">
          Username is required
        </span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" placeholder="Enter your password"
          autocomplete="current-password" />
        <span class="error" *ngIf="form.get('password')?.touched && form.get('password')?.hasError('required')">
          Password is required
        </span>
      </div>

      <button type="submit" class="btn-primary" [disabled]="isLoading">
        <span class="material-icons" *ngIf="!isLoading">login</span>
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a routerLink="/register">Create one</a>
    </p>
  </div>
</div>
