<div class="page-container">
  <div class="form-card">
    <div class="form-header">
      <h2>{{ isEditMode ? 'Edit Task' : 'Create New Task' }}</h2>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="task-form">
      <div class="form-group">
        <label for="title">Title <span class="required">*</span></label>
        <input id="title" type="text" formControlName="title" placeholder="What needs to be done?" />
        <span class="error" *ngIf="form.get('title')?.touched && form.get('title')?.hasError('required')">
          Title is required
        </span>
        <span class="error" *ngIf="form.get('title')?.touched && form.get('title')?.hasError('maxlength')">
          Max 100 characters
        </span>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" formControlName="description" rows="4" placeholder="Add a description..."></textarea>
        <span class="error" *ngIf="form.get('description')?.touched && form.get('description')?.hasError('maxlength')">
          Max 500 characters
        </span>
      </div>

      <div class="form-group">
        <label for="status">Status</label>
        <select id="status" formControlName="status">
          <option value="TO_DO">To Do</option>
          <option value="IN_PROGRESS">In Progress</option>
          <option value="DONE">Done</option>
        </select>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-outline" (click)="onCancel()">
          <span class="material-icons">close</span> Cancel
        </button>
        <button type="submit" class="btn-primary" [disabled]="isLoading">
          <span class="material-icons" *ngIf="!isLoading">{{ isEditMode ? 'save' : 'add_task' }}</span>
          {{ isLoading ? 'Saving...' : (isEditMode ? 'Update Task' : 'Create Task') }}
        </button>
      </div>
    </form>
  </div>
</div>
