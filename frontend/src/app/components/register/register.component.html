<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="app-logo"> Taskify</div>
      <p class="auth-subtitle">Create your account to get started.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input id="username" type="text" formControlName="username" placeholder="Choose a username"
          autocomplete="username" />
        <span class="error" *ngIf="form.get('username')?.touched && form.get('username')?.hasError('required')">
          Username is required
        </span>
        <span class="error" *ngIf="form.get('username')?.touched && form.get('username')?.hasError('minlength')">
          Minimum 3 characters
        </span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" placeholder="Create a password"
          autocomplete="new-password" />
        <span class="error" *ngIf="form.get('password')?.touched && form.get('password')?.hasError('required')">
          Password is required
        </span>
        <span class="error" *ngIf="form.get('password')?.touched && form.get('password')?.hasError('minlength')">
          Minimum 6 characters
        </span>
      </div>

      <button type="submit" class="btn-primary" [disabled]="isLoading">
        <span class="material-icons" *ngIf="!isLoading">person_add</span>
        {{ isLoading ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
