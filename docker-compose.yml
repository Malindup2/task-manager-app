version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: task_manager_db
    restart: always
    environment:
      MYSQL_DATABASE: taskmanager_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend/treinetic
      dockerfile: Dockerfile
    container_name: task_manager_backend
    restart: always
    environment:
      - DB_URL=jdbc:mysql://db:3306/taskmanager_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD:-root}
      - JWT_SECRET=${JWT_SECRET:-defaultSecretKeyPleaseChangeInProduction}
      - SERVER_PORT=8080
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: task_manager_frontend
    restart: always
    ports:
      - "4200:4200"
    environment:
      - API_URL=http://localhost:8080
    depends_on:
      - backend

volumes:
  mysql_data:
